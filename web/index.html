<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCon Internet</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

<div class="bg"></div>

<header class="nav">
    <div class="logo-container">
        <img src="./assets/quickcon_logo-removebg-preview.png" alt="QuickCon Logo">
    </div>

    <div class="nav-links">
        <button>Home</button>
        <button>Login</button>
    </div>
</header>

<main class="hero">
    <div class="hero-left">

        <div class="quickcon-logo">
            <img src="./assets/QUICKCON_LOGO_WITH_L.png" alt="QuickCon Logo">
        </div>

        <h1>Fast. Reliable. Internet.</h1>
        <p>Premium fiber connection for modern homes.</p>

        <button class="get-connected-button">Get Connected</button>

    </div>

    <div class="plans">

        <div class="card">
            <h2>65 Mbps</h2>
            <p class="price">₱1000</p>
            <span>Monthly</span>
        </div>

        <div class="card highlight">
            <h2>95 Mbps</h2>
            <p class="price">₱1300</p>
            <span>Most Popular</span>
        </div>

        <div class="card">
            <h2>125 Mbps</h2>
            <p class="price">₱1500</p>
            <span>Monthly</span>
        </div>

    </div>
    <div>
        
    </div>

</main>

</body>
</html>
