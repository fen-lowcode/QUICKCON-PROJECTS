<html>
<head>
    <link rel = "shortcut icon" href = "QuickIcon.ico" type = "image/x-icon">
    <title> Application Form - QuickCon Internet </title>
</head>
<body>

<div class = "main">
    <div class = "webRibbon">
        <img id = "QCLogo" src = "QuickCon Logo.png">
        <button type = "button" id = "BLogin"> Login </button>
        <div id = "BLogout"> Logout </div>
        <button type = "button" id = "BHome"> Home </button>
    </div>

    <form class = "applicationArea" id = "form1">
        <div class = "title"> 
            <div class = "titleLine-1"> INSTALLATION FORM </div>
            <div class = "titleLine-2"> APPLICANT'S PERSONAL DETAILS </div>
        </div>

        <!-- 1st Row -->
        <div class = "textInput" id = "defaultInputStyle">
            <label for = "nameBox" class = "inputLabels"> NAME: </label>
            <input type = "text" class = "textBox" id = "nameBox" placeholder = "(Required)"/>
        </div>
        <div class = "small-textInput" id = "defaultInputStyle">
            <label for = "ageBox" class = "inputLabels"> AGE: </label>
            <input type = "number" class = "textBox" id = "ageBox" min = "1" max = "100"/>
        </div>
        <div class = "small-textInput" id = "defaultInputStyle">
            <label for = "sexBox" class = "inputLabels"> SEX: </label>
            <select type = "text" class = "textBox" id = "sexBox">
                <option> ? </option>
                <option> Male </option>
                <option> Female </option>
                <option> Truck </option>
                <option> Helicopter </option>
                <option> Chair </option>
            </select>
        </div>
        <div class = "contact-textInput" id = "defaultInputStyle">
            <label for = "contactBox" class = "inputLabels"> CONTACT NO.: </label>
            <input type = "text" class = "textBox" id = "contactBox" placeholder = "(Required)"/>
        </div>

        <!-- 2nd Row -->
        <div class = "textInput" id = "defaultInputStyle">
            <label for = "emailBox" class = "inputLabels"> E-MAIL ADDRESS: </label>
            <input type = "text" class = "textBox" id = "emailBox"/>
        </div>
        <div class = "textInput" id = "defaultInputStyle">
            <label for = "occBox" class = "inputLabels"> OCCUPATION: </label>
            <input type = "text" class = "textBox" id = "occBox"/>
        </div>

        <!-- 3rd Row -->
        <div class = "textInput" id = "defaultInputStyle">
            <label for = "bdayBox" class = "inputLabels"> DATE OF BIRTH: </label>
            <input type = "date" class = "textBox" id = "bdayBox"/>
        </div>
        <div class = "textInput" id = "defaultInputStyle">
            <label for = "bplaceBox" class = "inputLabels"> PLACE OF BIRTH: </label>
            <input type = "text" class = "textBox" id = "bplaceBox"/>
        </div>

        <!-- 4th Row -->
        <div class = "long-textInput" id = "defaultInputStyle">
            <label for = "addBox" class = "inputLabels"> ADDRESS: </label>
            <input type = "text" class = "textBox" id = "addBox" placeholder = "(Required)"/>
        </div>
    </form>

    <div class = "submissionArea">
        <div  class = "planArea">
            <div class = "long-textInput" id = "defaultInputStyle">
                <label for = "planBox" class = "inputLabels"> PLAN: </label>
                <select type = "text" class = "textBox" id = "planBox">
                    <option > 65 Mbps | ₱ 1, 000.00 (Monthly) </option>
                    <option > 95 Mbps | ₱ 1, 300.00 (Monthly) </option>
                    <option > 125 Mbps | ₱ 1, 500.00 (Monthly) </option>
                </select>
            </div>
        </div>
        <div  class = "buttonArea">
            <button type = "button" class = "subArea-Button" id = "BSubmit"> SUBMIT APPLICATION </button>
            <div class = "prompt-style" id = "confirmPrompt">
                <button 
                    type = "submit" 
                    class = "promptYesButton-style"
                    form = "form1"
                    > SUBMIT </button>
                <button 
                    type = "button" 
                    class = "promptNoButton-style"
                    > Return </button>
            </div>

            <button type = "button" class = "subArea-Button" id = "BClear"> CLEAR ALL </button>
            <div class = "prompt-style" id = "warningPrompt">
                <button 
                    type = "reset" 
                    class = "promptYesButton-style"
                    form = "form1"
                    > CONFIRM </button>
                <button 
                    type = "button" 
                    class = "promptNoButton-style"
                    > Return </button>

                <div class = "promptText-style" id = "wp-Line1"> WARNING </div>
                <div class = "promptText-style" id = "wp-Line2"> Mawawawala lahat ng detalye kapag pinindot mo ito! Sigurado ka? </div>
                <div class = "promptText-style" id = "wp-Line3"> All details will disappear if you click this button! Are you sure? </div>

                <img id = "warning1" src = "warning_icon.png">
                <img id = "warning2" src = "warning_icon.png">
            </div>

        </div>
    </div>
</div>

</body>
</html>
<style>

html {
    font-family: "quicksand";
    font-weight: normal;
}
body .main{
    position: absolute; top: 0; left: 0;
    height: 100%; width: 100%;

    display: grid; 
    grid-template-columns: 1fr min(90%, 930px) 1fr;
    grid-template-rows: auto auto 1fr;

}

/* MAIN RIBBON _______________________________________________ */
.webRibbon { 
    position: relative; top:0; left: 0;
    width: 100%; height: 100%; min-height: 50px;
    background-color: #cee7ff;

    grid-area: 1 / 1 / 2 / 4;

    #QCLogo{
        visibility: visible; position: absolute; 

        top: 10%; left: 20px; height: 80%;
        filter: drop-shadow(0 0 0.1px black) brightness(120%);
        border-right: 2px solid #95A9BA; 
        padding-right: 15px;
    }
    #BLogin{
        background: none; border: none; position: absolute; 
        opacity: 30%;

        top: 10%; right: 34px;
        height: 80%; width: 80; 
        font-size: calc(1 * 100%); 
        font-family: "quicksand";
        letter-spacing: 1;

        display: flex; 
        justify-content: center; align-items: center;

        border-right: 2px solid #95A9BA; border-left: 2px solid #95A9BA;
    }
    #BLogout{
        visibility: hidden; position: absolute; 

        top: 10%; right: 30;
        height: 80%; width: 80; 
        font-size: calc(1 * 100%);
        letter-spacing: 1;

        display: flex; 
        justify-content: center; align-items: center;
        border-right: 2px solid #95A9BA; 
        border-left: 2px solid #95A9BA;
    }
    #BHome{
        background: none; border: none; position: absolute;

        top: 10%; right: 112;
        height: 80%; width: 80; 
        font-size: calc(1 * 100%);
        font-family: "quicksand";
        letter-spacing: 1;

        display: flex; 
        justify-content: center; align-items: center;
        border-right: 2px solid #95A9BA; 
        border-left: 2px solid #95A9BA;

        cursor: pointer;
    }
}

/* Application Area _______________________________________________ */
.applicationArea{
    border: white 0.5px solid;
    grid-area: 2 / 2 / 3 / 3;

    font-family: "quicksand";

    display: flex; row-gap: 1.8em;
    flex-wrap: wrap; justify-content: start;
    padding-left: 4.5%;
    padding-top: 3%; padding-bottom: 3%;

    /* main containers */
    .title{
        display: flex; flex-direction: column;
        align-items: center;
        font-size: 100%;

        .titleLine-1{
            color: #0e7715;
            font-weight: 650; 
            text-decoration: underline;
            text-decoration-thickness: 2px;
            letter-spacing: 5px;

            padding-bottom: 2.5%;
        }
        .titleLine-2{
            color: #353a4d;
            font-weight: 650;
        }
    }

    .textInput{
        width: 48.75%;
    }
    .small-textInput{
        width: 11%;
    }
    .long-textInput{
        width: 100%;
    }
    .contact-textInput{
        width: 25.5%;
    }

    /* item order */
    .title{
        flex-basis: 100%;
        order: -1;
    }
}

   /* input styles */
#defaultInputStyle{
    display: flex; flex-direction: column;
    font-size: 85%; font-weight: 700;
}
.inputLabels{
    position: relative; left: 3px; bottom: 3px;
    letter-spacing: 0.8px;
    color: #353a4d;
}
.textBox{
    width: 95%;
    border: #6a6f81 1px solid;
    box-shadow: inset 0 0 1px #353a4d;
}
.textBox[type = "number"]{
    padding-left: 8px; padding-top: 5px; padding-bottom: 7px;
    font-family: "quicksand"; 
    font-size: 100%; font-weight: 500;
    letter-spacing: 0.8px;
}
.textBox[type = "text"]{
    padding-left: 8px; padding-top: 5px; padding-bottom: 7px;
    font-family: "quicksand"; 
    font-size: 100%; font-weight: 500;
    letter-spacing: 0.8px;
}
.textBox[type = "date"]{
    padding-left: 8px; padding-top: 4px; padding-bottom: 6px;
    font-family: "quicksand"; 
    font-size: 100%; font-weight: 500;
    letter-spacing: 0.8px;
    cursor: text;
}
.textBox[type = "date"]::-webkit-calendar-picker-indicator {
    background-image: url("calendar-icon.png");
    padding-right: 2.5%;
    cursor: pointer;
}

/* Submission Area _______________________________________________ */
.submissionArea{
    border-top: rgba(0, 0, 0, 0.3) 1px solid;
    grid-area: 3 / 2 / 4 / 3;

    display: flex; flex-direction: row;
    gap: 2em;

    .planArea{
        flex-basis: 100%;
        display: flex; flex-direction: row;
        flex-wrap: wrap; justify-content: start;
        padding-left: 4.5%;
        padding-top: 4%;

        .inputLabels{
            font-size: 110%;
        }
        .long-textInput{
            width: 100%;
        }
    }

    .buttonArea{
        flex-basis: 100%; 
        display: flex; flex-direction: column;
        flex-wrap: nowrap; place-items: center;
        gap: 15px;
        padding: 4.5%;
        padding-top: 6%; padding-bottom: 15%;

        position: relative;

        .subArea-Button{
            border: #353a4d 2px solid;
            border-radius: 0.8em;
            background-color: #353a4d;

            height: 15%; width: 72%;
            min-height: 45px; max-width: 400px;
            
            color: white;
            font-family: "quicksand";
            font-size: 110%; font-weight: 750;
        }

        #warningPrompt{
            visibility: hidden;
        }
        #wp-Line1{
            position: absolute;
            width: 100%; top: min(1.7vw, 25px);

            color: #353a4d;
            font-weight: bold;

            text-align: center;
        }
        #wp-Line2{
            position: absolute;
            width: 90%; top: min(5.7vw, 70px);

            color: #353a4d;

            text-align: center;
        }
        #wp-Line3{
            position: absolute;
            width: 90%; top: min(12.7vw, 140px);

            color: #95A9BA;
            font-weight: bold;

            text-align: center;
        }
        #warning1{
            position: absolute;
            height: min(4vw, 40px);
            top: min(1vw);
            left: min(17vw, 155px);
        }
        #warning2{
            position: absolute;
            height: min(4vw, 40px);
            top: min(1vw);
            right: min(17vw, 155px);
        }

        #confirmPrompt{
            visibility: hidden;
        }
    }
}
    /* prompt styles */
.prompt-style{
    position: fixed;
    top: 50%; left: 50%; transform: translate(-50%, -60%);
    height: 27vw; width: 55vw;
    max-height: 290px; max-width: 500px;

    background-color: white;
    border-radius: min(2vw, 15px);
    border: black 1px solid;

    display: flex; 
    justify-content: space-evenly;
}
.promptText-style{
    font-size: min(2vw, 19px);
    letter-spacing: 1px;
}
.promptNoButton-style{
    position: relative; order: 1;
    align-self: end;
    height: 6vw; width: 18vw; bottom: 2vw; 
    max-height: 35px; max-width: 180px;

    color: #353a4d;
    font-weight: bold; font-size: min(1.7vw, 15px);

    background: white;
    border: black 1px solid;
    border-radius: 5px;

    cursor: pointer;
}
.promptYesButton-style{
    position: relative; order: 2;
    align-self: end;
    height: 6vw; width: 18vw; bottom: 2vw;
    max-height: 35px; max-width: 180px;

    color: white;
    font-weight: 700; font-size: min(1.7vw, 15px);

    background: linear-gradient(to right,#45a8ff, #ffe231);
    border: black 1px solid;
    border-radius: 5px;

    cursor: pointer;
}

@font-face {
    font-family: "anton";
    src: url('Anton/Anton-Regular.ttf') format("truetype");
}
@font-face {
    font-family: "quicksand";
    src: url('Quicksand/Quicksand-VariableFont_wght.ttf') format("truetype");
}
@font-face {
    font-family: "theseasons";
    src: url('The-Seasons/Demo_Fonts/Fontspring-DEMO-theseasons-bd.otf') format("truetype");
}
@media (max-width: 1200px){
    .applicationArea, .submissionArea .planArea{
        .textInput{
            width: 100%;
        }
        .small-textInput{
            width: 22.75%;
        }
        .long-textInput{
            width: 100%;
        }
        .contact-textInput{
            width: 52%;
        }
    }

    .submissionArea{
        flex-direction: column;
        
        .buttonArea{
            padding-top: 3%;
        }
    }
}

/* EVENTSs _______________________________________________ */

/* --------------------------Hovers-------------------------- */
#BHome:hover{
    background-color: #9FD2FF;
    transition: background-color 0.2s;
}
#BHome:hover:active{
    background-color: #f0f8ff;
    transition: 0.1s;
}
/* --------------------------clicks-------------------------- */
.submissionArea .buttonArea .subArea-Button:active{
    color: #353a4d;
    background-color: white;
    transition: 0.1s;
}

#BClear:focus + #warningPrompt, .prompt-style:hover, .prompt-style:focus-within{
    visibility: visible;
    transform: scale(1);

    position: fixed;
    top: 50%; left: 50%; transform: translate(-50%, -60%);
    transition: 0.2s;
}

#BSubmit:focus + #confirmPrompt, .prompt-style:focus, .prompt-style:focus-within{
    visibility: visible;
    transform: scale(1);

    position: fixed;
    top: 50%; left: 50%; transform: translate(-50%, -60%);
    transition: 0.2s;
}
.promptNoButton-style:active + #prompt-style{
    visibility: hidden;
}

</style>
