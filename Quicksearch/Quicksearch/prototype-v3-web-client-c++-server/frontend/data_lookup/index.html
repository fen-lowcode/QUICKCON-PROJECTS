<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Network Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    <header class="glass-header">

        <div class="controls">
            <input type="text" id="tableSearch" placeholder="Search records..." onkeyup="filterTable()">
            <button class="add-btn" onclick="">+ Add Customer</button>
        </div>

        <div class="header-right">
            <img id="logo" src="../../assets/quicksearch-logo.png">
            <h1>Quickcon's Customer Data Records</h1>
            <span class="count-badge" id="rowCount">0 Records Loaded</span>
        </div>

    </header>

    <div class="data-card">
        <div class="scroll-area">
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>STATUS</th>
                        <th>ID</th>
                        <th>CLIENTS NAME</th>
                        <th>CREDENTIALS</th>
                        <th>ADDRESS</th>
                        <th>PLAN</th>
                        <th>DATE APPLIED</th>
                        <th>CONTACT NO</th>
                        <th>AGE</th>
                        <th>SEX</th>
                        <th>SOCIAL MEDIA</th>
                        <th>OCCUPATION</th>
                        <th>DATE OF BIRTH</th>
                        <th>PLACE OF BIRTH</th>
                        <th>OPTICAL INFO</th>
                        <th>SC CONNECTOR</th>
                        <th>FIBER DROP</th>
                        <th>TAPPING CLIP</th>
                        <th>CABLE TIE</th>
                        <th>F CLAMP</th>
                        <th>REMARKS</th>
                        <th>INSTALLED_BY</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
