<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quickcon Network Portal</title>
    <link rel="stylesheet" href="client_list_style.css">
    <link rel="stylesheet" href="client_profile_style.css">
    <link rel="stylesheet" href="profile_history_style.css">
    <link rel="stylesheet" href="add_client.css">
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet"> -->
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../../assets/quicksearch-logo.png" alt="Quickcon Logo">
        </div>
        <nav>
            <a href="#" class="nav-item active" onclick="loadTemplates('view-client-list'); fetchClientmasterList();">Client List</a>
        </nav>
    </aside>

    <main id="app-container" style="margin-left: 320px; padding: 20px;">
        </main>

    <template id="view-client-list">
        <header class="glass-header">
            <div class="controls">
                <input type="text" id="tableSearch" placeholder="Search records..." onkeyup="filterTable()">
                <button id="add-customer-btn" onclick="showAddCustomerForm()"">+ Add Customer</button>
                <span class="count-badge" id="rowCount">0 Records Loaded</span>
            </div>
        </header>
        <div class="data-card">
            <div class="scroll-area">
                <table id="customerTable">
                    <thead>
                        <tr id="table">
                            <th>DELETE</th>
                            <th>STATUS</th>
                            <th>ID</th>
                            <th>NAME</th>
                            <th>CREDENTIALS</th>
                            <th>ADDRESS</th>
                            <th>PLAN</th>
                            <th>APPLIED</th>
                            <th>CONTACT</th>
                            <th>AGE</th>
                            <th>SEX</th>
                            <th>SOCIAL</th>
                            <th>JOB</th>
                            <th>BIRTH DATE</th>
                            <th>BIRTH PLACE</th>
                            <th>OPTICAL INFO</th>
                            <th>SC</th>
                            <th>FIBER DROP</th>
                            <th>TAPPING CLIP</th>
                            <th>CABLE TIE</th>
                            <th>FCLAMP</th>
                            <th>REMARKS</th>
                            <th>INSTALLER</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </template>










    <div id="profile-modal-background">

        <div class="modal-wrapper">
        <aside class="modal-sidebar">
                <a href="#" id="profile-sidebar-padding"></a>
                <a href="#" class="nav-item active">Profile Info</a>
                <a href="#" class="nav-item">Billing History</a>
            </nav>
            <div class="sidebar-footer">
                <button class="update-btn">Update Record</button>
            </div>
        </aside>
    
        <div class="info-grid">
            <div id="profile-modal-header">
                <span id="customer-name"></span>
                <span class="close-modal" onclick="closeProfile()">&times;</span>
            </div>

            <section class="info-card">
                <h3>Account & Plan</h3>
                <div class="field-group"><label>Client ID</label><div id="view-id" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Client Name</label><div id="view-name" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Service Plan</label><div id="view-plan" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Credentials</label><div id="view-creds" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Date Applied</label><div id="view-applied" contenteditable="true" class="editable-field"></div></div>
            </section>

            <section class="info-card">
                <h3>Client Identity</h3>
                <div class="row-flex">
                    <div class="field-group"><label>Age</label><div id="view-age" contenteditable="true" class="editable-field"></div></div>
                    <div class="field-group"><label>Sex</label><div id="view-sex" contenteditable="true" class="editable-field"></div></div>
                </div>
                <div class="field-group"><label>Occupation</label><div id="view-job" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Birth Date</label><div id="view-dob" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Birth Place</label><div id="view-pob" contenteditable="true" class="editable-field"></div></div>
            </section>

            <section class="info-card">
                <h3>Contact & Localization</h3>
                <div class="field-group"><label>Full Address</label><div id="view-address" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Contact No</label><div id="view-contact" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Social Media</label><div id="view-social" contenteditable="true" class="editable-field"></div></div>
            </section>

            <section class="info-card">
                <h3>Technical Details</h3>
                <div class="field-group"><label>Installed By</label><div id="view-tech" contenteditable="true" class="editable-field"></div></div>
                <div class="field-group"><label>Remarks</label><div id="view-remarks" contenteditable="true" class="editable-field"></div></div>
            </section>

            
            <section class="info-card full-width">
                <h3><i class="icon"></i> Installation Materials & hardware</h3>
                <div class="materials-grid">
                    <div class="material-item">
                        <label>Optical Info </label>
                        <div id="view-optical" class="editable-field" contenteditable="true"></div>
                    </div>

                    <div class="material-item">
                        <label>Fiber Drop (Meters)</label>
                        <div id="view-fiber" class="editable-field" contenteditable="true"></div>
                    </div>

                    <div class="material-item">
                        <label>Tapping Clips (Qty)</label>
                        <div id="view-clip" class="editable-field" contenteditable="true"></div>
                    </div>

                    <div class="material-item">
                        <label>Cable Ties</label>
                        <div id="view-tie" class="editable-field" contenteditable="true"></div>
                    </div>

                    <div class="material-item">
                        <label>F-Clamp</label>
                        <div id="view-fclamp" class="editable-field" contenteditable="true"></div>
                    </div>

                    <div class="material-item">
                        <label>SC Connector</label>
                        <div id="view-sc" class="editable-field" contenteditable="true"></div>
                    </div>
                </div>
            </section>
        </div>
        </div>
    </div>















    <template id="view-payment-history">
        <div class="view-header">
            <div class="title-group">
                <h2 id="prof-name-display-history">Client Payment Logs</h2>
                <span class="badge">Account: <span id="view-id-history">---</span></span>
            </div>
            <div class="payment-actions">
                <button class="btn-primary">+ Add Payment History</button>
            </div>
        </div>

        <div class="data-card">
            <div class="scroll-area">
                <table id="paymentTable">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Reference No.</th>
                            <th>Amount (PHP)</th>
                            <th>Payment Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="paymentBody">
                        <tr>
                            <td><input type="datetime-local" class="edit-input"></td>
                            <td><div contenteditable="true" class="editable-field">REF-001</div></td>
                            <td><div contenteditable="true" class="editable-field">0.00</div></td>
                            <td>
                                <select class="status-dropdown">
                                    <option value="full">Full Paid</option>
                                    <option value="partial">Partial Paid</option>
                                    <option value="pending">Pending</option>
                                </select>
                            </td>
                            <td><button class="btn-icon-del">×</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </template>























    <!-- POP OUT BOX -->

    <div id="customModal" class="modal-overlay">
        <div class="modal-box large">
            <div class="modal-header">
                <h2 id="modalTitle"> New Customer Registration</h2>
                <span class="close-modal" onclick="hideAddCustomerForm()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="customerForm">
                    <h3 class="section-divider">Client Identity</h3>
                    <div class="input-row">
                        <div class="input-group flex-2">
                            <label>Client Name</label>
                            <input type="text" id="m-name" placeholder="Full Name">
                        </div>
                        <div class="input-group flex-1">
                            <label>Sex</label>
                            <select id="m-sex">
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="input-group flex-1">
                            <label>Age</label>
                            <input type="number" id="m-age">
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Date of Birth</label>
                            <input type="date" id="m-dob">
                        </div>
                        <div class="input-group">
                            <label>Place of Birth</label>
                            <input type="text" id="m-pob">
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Occupation</label>
                            <input type="text" id="m-job">
                        </div>
                        <div class="input-group">
                            <label>Social Media</label>
                            <input type="text" id="m-social" placeholder="@username/link">
                        </div>
                    </div>

                    <h3 class="section-divider">Service Details</h3>
                    <div class="input-group">
                        <label>Address</label>
                        <input type="text" id="m-address">
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Contact No.</label>
                            <input type="text" id="m-contact">
                        </div>
                        <div class="input-group">
                            <label>Credentials</label>
                            <input type="text" id="m-creds" placeholder="RVM-LP?-NP?-P?">
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Service Plan</label>
                            <input type="text" id="m-plan">
                        </div>
                        <div class="input-group">
                            <label>Date Applied</label>
                            <input type="date" id="m-applied">
                        </div>
                    </div>

                    <h3 class="section-divider">Technical & Materials</h3>
                    <div class="input-row grid-4">
                        <div class="input-group"><label>Optical Info</label><input type="text" id="m-optical"></div>
                        <div class="input-group"><label>SC Connector</label><input type="text" id="m-sc"></div>
                        <div class="input-group"><label>Fiber Drop</label><input type="text" id="m-fiber"></div>
                        <div class="input-group"><label>Tapping Clip</label><input type="text" id="m-clip"></div>
                    </div>

                    <div class="input-row grid-4">
                        <div class="input-group"><label>Cable Tie</label><input type="text" id="m-tie"></div>
                        <div class="input-group"><label>F-Clamp</label><input type="text" id="m-fclamp"></div>
                        <div class="input-group flex-2"><label>Installed By</label><input type="text" id="m-tech"></div>
                    </div>

                    <div class="input-group">
                        <label>Remarks</label>
                        <textarea id="m-remarks" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="saveModalData">Save Record</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="add_client.js"></script>
    <script src="api.js"></script>
</body>
</html>
